dsDescription:
- dsDescriptionValue: "Ensemble des indicateurs des séries par horizons temporels associées aux 36 chaînes de modélisations de débits journaliers issus de 9 modèles hydrologiques pour la sélection des 4 narratifs climatiques Explore2 sous RCP 8.5. Ces fichiers résultent de l'agrégation temporelle des simulations hydrologiques sous runs historiques (avant 2005) et des projections hydrologiques (post 2005), fichiers NetCDF disponibles au téléchargement dans la collection <a href='https://entrepot.recherche.data.gouv.fr/dataverse/explore2-projections_hydrologiques'>Explore2 - Projections hydrologiques</a>.<br><br>

Ce dépôt regroupe un tableau par indicateur et chaîne de simulation par narratif pour chaque modèle hydrologique, c'est-à-dire, scénario d'émission RCP, couple GCM/RCM, correction de biais BC et modèle hydrologique HM. Ces données sont brutes et contiennent donc des chaînes de projections jugées aberrantes / horsains qu'il est possible de filtrer grâce à des <a href='https://doi.org/10.57745/YZNENQ'>métadonnées supplémentaires</a>. Pour des raisons techniques, ces indicateurs sont regroupés par dossiers compressés selon les différentes phases du régime hydrologique.<br><br>

La description des chaines de modélisation du climat et celle des modèles hydrologiques sont, respectivement, disponibles dans le rapport <a href='https://doi.org/10.57745/PUR7ML'>https://doi.org/10.57745/PUR7ML</a> et dans les annexes du rapport <a href='https://doi.org/10.57745/S6PQXD'>https://doi.org/10.57745/S6PQXD</a>. Retrouvez le diagnostic des modèles hydrologiques résumé à l'échelle des régions hydrologiques dans les fiches téléchargeables ici : <a href='https://doi.org/10.57745/DMFUXW'>https://doi.org/10.57745/DMFUXW</a>.<br><br>

<b>Définition des 4 narratifs climatiques</b> :<ul>
<li><b>violet</b> (#791F5D) : HadGEM2-ES_historical-rcp85_CCLM4-8-17_ADAMONT<br>
Fort réchauffement et forts contrastes saisonniers en précipitations</li>
<li><b>orange</b> (#E09B2F) : EC-EARTH_historical-rcp85_HadREM3-GA7_ADAMONT<br>
Fort réchauffement et fort assèchement en été (et en annuel)</li>
<li><b>jaune</b> (#EECC66) : CNRM-CM5_historical-rcp85_ALADIN63_ADAMONT<br>
Changements futurs relativement peu marqués</li>
<li><b>vert</b> (#569A71) : HadGEM2-ES_historical-rcp85_ALADIN63_ADAMONT<br>
Réchauffement marqué et augmentation des précipitations</li>
</ul>

<b>Métadonnées supplémentaires</b> : <ul>
<li>Récapitulatif de l'ensemble des indicateurs hydrologiques : <a href='https://doi.org/10.57745/JVNHQL'>https://doi.org/10.57745/JVNHQL</a></li>
<li>Récapitulatif de l'ensemble des chaînes de simulation : <a href='https://doi.org/10.57745/R6HG5X'>https://doi.org/10.57745/R6HG5X</a></li>
<li>Description de l'ensemble des points de simulation : <a href='https://doi.org/10.57745/UTKWR5'>https://doi.org/10.57745/UTKWR5</a></li>
<li>Liste des chaînes de modélisation jugées aberrantes / horsains : <a href='https://doi.org/10.57745/YZNENQ'>https://doi.org/10.57745/YZNENQ</a></li>
<li>Récapitulatif des années pivots utilisées pour la TRACC : <a href='https://doi.org/10.57745/DCOQM6'>https://doi.org/10.57745/DCOQM6</a></li></ul>

<b>Décomposition des chaînes de caractères formant le nom des fichiers parquet, séparées par des \"_\"</b> :<br>
{1} <i>Indicateur</i> : Le nom de l’indicateur, du type de statistique calculée<br>
{2} <i>Échantillonnage</i> : Échantillonnage temporel sur laquelle est calculé l’indicateur<br>
&#8594; {1}_{2} <i>Variable</i> : Variable résultante d'un indicateur temporellement contextualisé<br>
{3} <i>HX</i> : Horizon futur (H[123])<br>
&#8594; {1}_{2}_{3} <i>Série</i> : Série d'une variable pour un horizon temporel, défini dans le <a href='https://doi.org/10.57745/JVNHQL'>récapitulatif des indicateurs hydrologiques</a><br>
{4} <i>EXP</i> : Identifiant de l’expérience historique (post 2005) ou future (post 2005)<br>
{5} <i>GCM</i> : Identifiant du GCM forçeur<br>
{6} <i>RCM</i> : Identifiant du RCM<br>
{7} <i>BC</i> : Identifiant de la méthode de correction de biais statistique<br>
{8} <i>HM</i> : Identifiant du modèle hydrologique<br>
{9} <i>Futur</i> : Période futur (fut-YYYYMMDD-YYYYMMDD)<br><br>

<b>Les colonnes des fichiers parquet sont</b> : <ul>
<li><i>EXP</i> : Voir ci-dessus</li>
<li><i>GCM</i> : Voir ci-dessus</li>
<li><i>RCM</i> : Voir ci-dessus</li>
<li><i>BC</i> : Voir ci-dessus</li>
<li><i>HM</i> : Voir ci-dessus</li>
<li><i>code</i> : Code à 10 caractères du point de simulation fourni dans la <a href='https://doi.org/10.57745/UTKWR5'>description des points de simulation</a></li>
<li><i>date</i> : (optionnelle) Date associée à l'agrégation (plus d'information dans les métadonnées de variable)</li>
<li><i>*Série*</i> : Voir ci-dessus</li></ul>

<hr>
Retrouvez des <a href='https://github.com/louis-heraut/Explore2_peche_aux_outils_RDG'>scripts d'aide</a> pour utiliser ces données parquet."
